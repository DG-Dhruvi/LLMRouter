# Project information
site_name: LLMRouter
site_url: https://ulab-uiuc.github.io/LLMRouter/
site_author: LLMRouter contributors
site_description: >-
  LLMRouter is an open-source library for LLM routing: train routers, run inference,
  and extend with plugins.

# Repository
repo_name: ulab-uiuc/LLMRouter
repo_url: https://github.com/ulab-uiuc/LLMRouter
edit_uri: edit/website/docs/

# Copyright
copyright: Copyright &copy; 2025 LLMRouter contributors

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - blog
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Additional configuration
extra:
  status:
    new: Recently added
    deprecated: Deprecated
  analytics:
    provider: google
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ulab-uiuc/LLMRouter
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/llmrouter/
    - icon: fontawesome/brands/slack
      link: https://join.slack.com/t/llmrouteropen-ri04588/shared_invite/zt-3jz3cc6d1-ncwKEHvvWe0OczHx7K5c0g
  # llm_search:
  #   enabled: true
  #   api_endpoint: "http://localhost:8000"
  # runllm:
  #   assistant_id: "YOUR_ASSISTANT_ID_HERE"  # Get this from RunLLM dashboard
  #   position: "bottom-right"  # Options: bottom-right, bottom-left, top-right, top-left
  #   theme: "light"  # Options: light, dark, auto


# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: ulab-uiuc
      repo: LLMRouter
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde


